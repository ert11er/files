name: Update Blog Posts JSON

on:
    push:
        branches:
            - main
        paths:
            - "blog/posts/**"
    workflow_dispatch:
    schedule:
        - cron: "0 1 * * *" # Runs every 15 minutes

jobs:
    update-json:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Run update script
              run: python blog/generate_posts_json.py

            - name: Commit and push changes to files-private
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "Update blog posts,posts.md and rss"
                  file_pattern: "blog/posts.json blog/rss.xml blog/posts.md"
