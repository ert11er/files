<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Notları</title>
    <link rel="stylesheet" href="/files/blog/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="header-top">
                <a href="/blog/" class="logo">Ders Notları</a>
                <div class="controls">
                    <button id="theme-toggle" aria-label="Temayı Değiştir">
                        <span class="icon-sun">☀️</span>
                        <span class="icon-moon">🌙</span>
                    </button>
                    <a href="/blog/rss.xml" class="rss-link" title="RSS Beslemesi">RSS</a>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Notlarda ara..." aria-label="Arama">
            </div>
            <nav id="tag-cloud">
                <!-- Tags will be injected here -->
            </nav>
        </header>

        <main id="content">
            <div id="loading" class="hidden">Yükleniyor...</div>
            <div id="post-list">
                <!-- Post list will be injected here -->
            </div>
            <article id="post-content" class="hidden">
                <button id="back-button">← Geri Dön</button>
                <div id="md-render"></div>
            </article>
        </main>
    </div>
    <script src="/blog/app.js"></script>
</body>
</html>
